<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お祝い献立紹介</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- あなたが作ったプログラムをここにギュッとまとめました ---
        function App() {
            const menuItems = [
                { id: "caesar", name: "シーザーサラダ", ingredients: ["レタス", "トマト", "生ハム"], steps: ["レタスを切る", "盛り付ける"] },
                { id: "bruschetta", name: "ブルスケッタ", ingredients: ["バゲット", "チーズ"], steps: ["焼いてのせる"] },
                { id: "potage", name: "じゃがいもポタージュ", ingredients: ["じゃがいも", "牛乳"], steps: ["煮てつぶす"] },
                { id: "roastbeef", name: "ローストビーフ", ingredients: ["牛ブロック肉", "ニンニク"], steps: ["焼いて寝かせる"] }
            ];

            return (
                <div style={{ padding: '20px', fontFamily: 'sans-serif' }}>
                    <h1 style={{ color: '#d44' }}>🎉 お祝いごとにおすすめな献立</h1>
                    {menuItems.map(item => (
                        <div key={item.id} style={{ marginBottom: '20px', borderBottom: '1px solid #ccc' }}>
                            <h2>{item.name}</h2>
                            <p><strong>材料:</strong> {item.ingredients.join('、')}</p>
                        </div>
                    ))}
                </div>
            );
        }

        // --- 画面に映し出すための最後の一押し ---
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
